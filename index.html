 
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لعبة جدول ٤ – إطلاق نار</title>

<style>
body{
    background:linear-gradient(#bde6ff,#7cc4ff);
    font-family:"Cairo",sans-serif;
    text-align:center;
}
.container{
    width:90%;
    margin:20px auto;
    background:#ffffffdd;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px #555;
}

h1{color:#0055aa;}

/* ======================
    الشخصية
====================== */
.character {
    position: relative;
    width: 140px;
    height: 200px;
    margin: auto;
}

.head {
    width: 120px;
    height: 120px;
    background: #ffe0bd;
    border-radius: 50%;
    border: 3px solid #444;
    position: relative;
    margin: auto;
}
.eye {
    width: 18px;
    height: 18px;
    background:black;
    border-radius: 50%;
    position: absolute;
    top: 40px;
}
.eye.left { left: 30px; }
.eye.right { right: 30px; }

.mouth {
    width: 50px;
    height: 20px;
    background:#ff6666;
    border-radius:0 0 25px 25px;
    position:absolute;
    bottom:30px;
    left:35px;
}

.body {
    width: 80px;
    height: 110px;
    background: #00aaff;
    margin: auto;
    border-radius: 20px;
    border: 3px solid #444;
}

/* ======================
    الوحش
====================== */
.monster {
    width: 120px;
    height: 120px;
    background: #ff4444;
    border-radius: 20px;
    position: absolute;
    top: 200px;
    right: -200px;
    border: 3px solid #440000;
    transition: all 2s linear;
}
.monster.dead {
    background: gray;
    transform: rotate(90deg);
}

/* ======================
    الرصاصة
====================== */
.bullet {
    width: 12px;
    height: 12px;
    background: yellow;
    border-radius: 50%;
    position: absolute;
    top: 250px;
    left: 200px;
    display: none;
}

button {
    padding:10px 25px;margin:10px;border:none;background:#0077cc;
    color:white;border-radius:10px;cursor:pointer;font-size:18px;
}
button.start { background:#00aa55; }

#timer{font-size:28px;color:#aa0000;font-weight:bold;}
#feedback{font-size:22px;margin:15px 0;}
#score{font-size:24px;color:#aa0000;}

</style>
</head>

<body>

<div class="container">

<h1>🎮 لعبة جدول ٤ (إطلاق النار)</h1>

<!-- الشخصية -->
<div class="character">
    <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
    </div>
    <div class="body"></div>
</div>

<!-- الوحش -->
<div id="monster" class="monster"></div>

<!-- الرصاصة -->
<div id="bullet" class="bullet"></div>

<h3>اختر المستوى:</h3>
<button onclick="setLevel(1)">سهل</button>
<button onclick="setLevel(2)">متوسط</button>
<button onclick="setLevel(3)">صعب</button>

<p id="levelText">لم يتم اختيار المرحلة</p>
<h2 id="timer">الوقت: ٠</h2>

<p id="question">اضغط ابدأ</p>
<input id="answer" type="number" placeholder="اكتب الإجابة">

<div>
    <button onclick="checkAnswer()">تحقق</button>
    <button class="start" onclick="startGame()">ابدأ اللعبة</button>
</div>

<p id="feedback"></p>
<p id="score">النتيجة: ٠</p>

</div>

<script>

// تحويل للأرقام العربية
function ar(n){ return String(n).replace(/[0-9]/g, d=>"٠١٢٣٤٥٦٧٨٩"[d]); }

let num=0, score=0, level=0, timeLeft=0;
let timerInterval;

// أصوات بسيطة
function tone(freq,dur){
    let ctx=new AudioContext();
    let osc=ctx.createOscillator();
    let gain=ctx.createGain();
    osc.frequency.value=freq;
    gain.gain.value=0.2;
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start();osc.stop(ctx.currentTime+dur);
}
function correctSound(){tone(800,0.2);}
function wrongSound(){tone(150,0.3);}

// تشغيل الوحش في اتجاه اللاعب
function bringMonster(){
    let m = document.getElementById("monster");
    m.classList.remove("dead");
    m.style.right = "20px"; // يتحرك نحو اللاعب
}

function killMonster(){
    let m = document.getElementById("monster");
    m.classList.add("dead");
    m.style.right = "-250px";
}

function shoot(){
    let b = document.getElementById("bullet");
    b.style.display = "block";
    b.style.left = "200px"; // بداية الرصاصة

    setTimeout(()=>{ b.style.left = "600px"; }, 10);

    setTimeout(()=>{
        b.style.display = "none";
        b.style.left = "200px";
    }, 600);
}

function setLevel(l){
    level=l;
    if(l==1) timeLeft=30;
    if(l==2) timeLeft=20;
    if(l==3) timeLeft=10;

    document.getElementById("levelText").innerText =
        "المستوى: "+(l==1?"سهل":l==2?"متوسط":"صعب");

    document.getElementById("timer").innerText = "الوقت: "+ar(timeLeft);
}

function startTimer(){
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText="الوقت: "+ar(timeLeft);
        if(timeLeft<=0){
            clearInterval(timerInterval);
            wrongSound();
            alert("انتهى الوقت!");
        }
    },1000);
}

function startGame(){
    if(level==0){ alert("اختر المستوى أولاً"); return; }

    bringMonster();
    startTimer();

    num = Math.floor(Math.random()*10+1);

    document.getElementById("question").innerText =
        "كم يساوي "+ar(4)+" × "+ar(num)+" ؟";

    document.getElementById("feedback").innerText="";
}

function checkAnswer(){
    let ans = document.getElementById("answer").value;

    if(ans == 4*num){
        score++;
        correctSound();
        shoot();     // ← إطلاق النار
        killMonster(); // ← قتل الوحش
        document.getElementById("feedback").innerText = "✔️ ممتاز!";
        document.getElementById("feedback").style.color="green";
    } else {
        wrongSound();
        document.getElementById("feedback").innerText = "❌ خطأ!";
        document.getElementById("feedback").style.color="red";
    }

    document.getElementById("score").innerText="النتيجة: "+ar(score);

    startGame();
}

</script>

</body>
</html>
