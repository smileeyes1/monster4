 
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لعبة جدول ضرب ٤</title>
<style>
    body {
        background: #222;
        color: white;
        font-family: Arial;
        text-align: center;
        margin: 0;
    }
    #gameArea {
        width: 100%;
        height: 500px;
        position: relative;
        background: linear-gradient(#333, #111);
        overflow: hidden;
        border-bottom: 4px solid #555;
    }
    #player {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 80px;
    }
    #monster {
        position: absolute;
        top: 200px;
        right: -150px;
        width: 120px;
        transition: transform 0.1s;
    }
    .button {
        display: block;
        width: 80%;
        margin: 10px auto;
        padding: 15px;
        background: #444;
        color: white;
        border-radius: 10px;
        font-size: 22px;
    }
    #speedSelect button {
        padding: 15px;
        margin: 10px;
        border-radius: 10px;
        font-size: 20px;
    }
</style>
</head>

<body>

<h2>⚔️ لعبة جدول ضرب العدد ٤</h2>

<!-- اختيار السرعة -->
<div id="speedSelect">
    <h3>اختر سرعة الوحش:</h3>
    <button onclick="startGame(1)">بطيء</button>
    <button onclick="startGame(2)">متوسط</button>
    <button onclick="startGame(3)">سريع</button>
</div>

<!-- منطقة اللعب -->
<div id="gameArea" style="display:none;">
    https://i.imgur.com/2y5cY3h.png
    <img id="monster" src="">
</div>

<h3 id="levelText"></h3>
<h2 id="question"></h2>

<div id="answers"></div>

<!-- أصوات -->
https://actions.google.com/sounds/v1/impacts/metal_impact.ogg</audio>
https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg</audio>
https://actions.google.com/sounds/v1/cartoon/descending_whistle_ending.ogg</audio>

<script>
let monsterSpeed = 2;
let level = 1;
let correctAnswer = 0;
let monsterHP = 1;
let monsterPosition = 1000;
let gameLoop;

function startGame(speed){
    monsterSpeed = speed;
    document.getElementById("speedSelect").style.display = "none";
    document.getElementById("gameArea").style.display = "block";
    nextLevel();
}

function nextLevel() {
    document.getElementById("levelText").innerText = "المرحلة: " + level;
    spawnMonster();
    generateQuestion();
}

function spawnMonster() {
    const monster = document.getElementById("monster");
    
    if(level % 3 === 0){
        monster.src = "https://i.imgur.com/tVmtF6n.png"; // وحش كبير
        monsterHP = 3;
    } else {
        monster.src = "https://i.imgur.com/YWzZy0T.png"; // وحش عادي
        monsterHP = 1;
    }

    monsterPosition = 1000;
    monster.style.right = monsterPosition + "px";

    clearInterval(gameLoop);
    gameLoop = setInterval(moveMonster, 30);
}

function moveMonster() {
    monsterPosition -= monsterSpeed;
    const monster = document.getElementById("monster");
    monster.style.right = monsterPosition + "px";

    if(monsterPosition < 50){
        clearInterval(gameLoop);
        document.getElementById("loseSound").play();
        document.getElementById("question").innerText = "انتهت اللعبة!";
        document.getElementById("answers").innerHTML = "";
    }
}

function generateQuestion(){
    let x = Math.floor(Math.random() * 10) + 1;
    correctAnswer = 4 * x;

    document.getElementById("question").innerText = "٤ × " + toArabic(x);

    let answersHTML = "";
    let correctIndex = Math.floor(Math.random() * 3);

    for(let i=0;i<3;i++){
        if(i === correctIndex){
            answersHTML += `<button class="button" onclick="checkAnswer(${correctAnswer})">${toArabic(correctAnswer)}</button>`;
        } else {
            let wrong = correctAnswer + (Math.floor(Math.random()*5)+1) * (Math.random()>0.5?1:-1);
            if(wrong < 1) wrong = 1;
            answersHTML += `<button class="button" onclick="checkAnswer(${wrong})">${toArabic(wrong)}</button>`;
        }
    }

    document.getElementById("answers").innerHTML = answersHTML;
}

function checkAnswer(ans){
    if(ans === correctAnswer){
        document.getElementById("shootSound").play();
        hitMonster();
    }
    generateQuestion();
}

function hitMonster(){
    monsterHP--;

    document.getElementById("hitSound").play();

    if(monsterHP <= 0){
        clearInterval(gameLoop);
        level++;
        setTimeout(nextLevel, 500);
    }
}

function toArabic(n){
    return n.toString()
    .replace(/0/g,"٠").replace(/1/g,"١").replace(/2/g,"٢")
    .replace(/3/g,"٣").replace(/4/g,"٤").replace(/5/g,"٥")
    .replace(/6/g,"٦").replace(/7/g,"٧").replace(/8/g,"٨").replace(/9/g,"٩");
}
</script>

</body>
</html>
