
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لعبة جدول ضرب ٤ ✨</title>

<style>
body {
    margin: 0;
    background: #222;
    color: white;
    font-family: "Cairo", sans-serif;
    text-align: center;
}

#startBtn {
    margin-top: 40px;
    padding: 20px 40px;
    font-size: 26px;
    background: #2ecc71;
    color: white;
    border-radius: 15px;
    border: none;
}

#gameArea {
    width: 100%;
    height: 430px;
    background: linear-gradient(#444, #111);
    position: relative;
    overflow: hidden;
    display: none;
}

/* ========================= PLAYER ========================= */

#player {
    position: absolute;
    bottom: 35px;
    left: 40px;
    width: 140px;
    height: 200px;
}

/* رأس اللاعب */
.player-head {
    width: 90px;
    height: 90px;
    background: #ffe0b3;
    border-radius: 50%;
    border: 4px solid black;
    position: absolute;
    top: 0;
    left: 25px;
    box-shadow: 0 0 10px #fff;
}

/* العيون */
.player-eye {
    width: 18px;
    height: 24px;
    background: white;
    border-radius: 50%;
    border: 3px solid #000;
    position: absolute;
    top: 30px;
}

.player-eye.left { left: 20px; }
.player-eye.right { right: 20px; }

/* جسم اللاعب */
.player-body {
    width: 90px;
    height: 100px;
    background: #4da6ff;
    border-radius: 20px;
    border: 4px solid black;
    position: absolute;
    top: 90px;
    left: 20px;
    box-shadow: 0 0 10px rgba(0,0,255,0.4);
}

/* ذراع اللاعب */
.player-arm {
    width: 28px;
    height: 70px;
    background: #ffe0b3;
    border-radius: 12px;
    border: 3px solid black;
    position: absolute;
    top: 110px;
    left: 85px;
    transform: rotate(25deg);
}

/* بندقية اللاعب */
#gun {
    width: 120px;
    height: 25px;
    background: linear-gradient(#333, #000);
    border: 4px solid black;
    border-radius: 5px;
    position: absolute;
    top: 135px;
    left: 110px;
}

#gun::after {
    content: "";
    position: absolute;
    width: 22px;
    height: 25px;
    background: #666;
    right: -22px;
    top: 0;
    border-radius: 5px;
}

/* ========================= MONSTER ========================= */

#monster {
    position: absolute;
    top: 150px;
    right: -220px;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, #ff7777, #cc0000);
    border-radius: 50%;
    border: 5px solid black;
    box-shadow: 0 0 25px rgba(255,0,0,0.6);
}

/* عيون الوحش */
.monster-eye {
    width: 35px;
    height: 45px;
    background: white;
    border-radius: 50%;
    border: 4px solid black;
    position: absolute;
    top: 45px;
}

.monster-eye.left { left: 35px; }
.monster-eye.right { right: 35px; }

/* فم الوحش */
.monster-mouth {
    width: 90px;
    height: 55px;
    background: black;
    border-radius: 0 0 50px 50px;
    position: absolute;
    top: 110px;
    left: 45px;
}

/* الوحش الكبير */
.boss {
    width: 230px !important;
    height: 230px !important;
    background: radial-gradient(circle, #ff5555, #990000) !important;
}

/* ========================= BULLET ========================= */

.bullet {
    width: 20px;
    height: 10px;
    background: yellow;
    border: 3px solid orange;
    border-radius: 5px;
    position: absolute;
    box-shadow: 0 0 12px yellow;
}

/* ========================= ANSWERS ========================= */

.btn {
    width: 80%;
    padding: 15px;
    margin: 10px auto;
    font-size: 24px;
    background: #333;
    color: white;
    border-radius: 12px;
    border: 2px solid #999;
}

.btn:hover {
    background: #555;
}
</style>
</head>

<body>

<h2>لعبة جدول ضرب العدد ٤ ✨</h2>

<button id="startBtn" onclick="startGame()">ابدأ اللعبة ▶️</button>

<div id="gameArea">

    <div id="player">
        <div class="player-head">
            <div class="player-eye left"></div>
            <div class="player-eye right"></div>
        </div>
        <div class="player-body"></div>
        <div class="player-arm"></div>
        <div id="gun"></div>
    </div>

    <div id="monster">
        <div class="monster-eye left"></div>
        <div class="monster-eye right"></div>
        <div class="monster-mouth"></div>
    </div>

</div>

<h2 id="levelText"></h2>
<h2 id="question"></h2>
<div id="answers"></div>

<!-- الأصوات -->
<audio id="shootSound">
    https://actions.google.com/sounds/v1/impacts/metal_impact.ogg
</audio>

<audio id="hitSound">
    https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg
</audio>

<audio id="loseSound">
    https://actions.google.com/sounds/v1/cartoon/descending_whistle_ending.ogg
</audio>

<script>
let level = 1;
let monsterHP = 1;
let correctAnswer = 0;
let position = 1100;
let speed = 4;
let loop;

/* ========================= START GAME ========================= */

function startGame(){
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("gameArea").style.display = "block";
    level = 1;
    nextLevel();
}

/* ========================= LEVEL SYSTEM ========================= */

function nextLevel(){
    document.getElementById("levelText").innerText = "المرحلة: " + toArabic(level);

    let mon = document.getElementById("monster");
    mon.className = "";
    mon.classList.add("boss");
    mon.classList.add("monster");

    if(level % 3 === 0){
        monsterHP = 3;
        mon.classList.add("boss");
    } else {
        monsterHP = 1;
        mon.classList.remove("boss");
    }

    position = 1100;
    mon.style.right = position + "px";

    clearInterval(loop);
    loop = setInterval(moveMonster, 30);

    generateQ();
}

/* ========================= MONSTER MOVE ========================= */

function moveMonster(){
    position -= speed;
    let mon = document.getElementById("monster");
    mon.style.right = position + "px";

    if(position < 50){
        clearInterval(loop);
        document.getElementById("loseSound").play();
        document.getElementById("question").innerText = "💀 انتهت اللعبة!";
        document.getElementById("answers").innerHTML = "";
    }
}

/* ========================= BULLET ========================= */

function shoot(){
    let b = document.createElement("div");
    b.className = "bullet";
    b.style.left = "200px";
    b.style.top = "190px";
    document.body.appendChild(b);

    let x = 200;
    let move = setInterval(()=>{
        x += 14;
        b.style.left = x + "px";

        if(x > window.innerWidth){
            b.remove();
            clearInterval(move);
        }
    }, 20);
}

/* ========================= HIT ========================= */

function hit(){
    monsterHP--;
    document.getElementById("hitSound").play();

    if(monsterHP <= 0){
        clearInterval(loop);
        level++;
        setTimeout(nextLevel, 400);
    }
}

/* ========================= QUESTIONS ========================= */

function generateQ(){
    let x = Math.floor(Math.random()*10)+1;
    correctAnswer = 4*x;

    document.getElementById("question").innerText = "٤ × " + toArabic(x);

    let html = "";
    let correctIndex = Math.floor(Math.random()*3);

    for(let i=0;i<3;i++){
        if(i === correctIndex){
            html += `<button class="btn" onclick="check(${correctAnswer})">${toArabic(correctAnswer)}</button>`;
        } else {
            let wrong = correctAnswer + (Math.floor(Math.random()*6)-3);
            if(wrong < 1) wrong = 1;
            html += `<button class="btn" onclick="check(${wrong})">${toArabic(wrong)}</button>`;
        }
    }

    document.getElementById("answers").innerHTML = html;
}

/* ========================= CHECK ========================= */

function check(ans){
    if(ans === correctAnswer){
        document.getElementById("shootSound").play();
        shoot();
        hit();
    }
    generateQ();
}

/* ========================= ARABIC NUMBERS ========================= */

function toArabic(n){
    return n.toString()
        .replace(/0/g,"٠").replace(/1/g,"١").replace(/2/g,"٢")
        .replace(/3/g,"٣").replace(/4/g,"٤").replace(/5/g,"٥")
        .replace(/6/g,"٦").replace(/7/g,"٧").replace(/8/g,"٨")
        .replace(/9/g,"٩");
}
</script>

</body>
</html>
